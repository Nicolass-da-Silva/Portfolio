<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolas Silva</title>
    <link rel="stylesheet" href="Styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo">NS</a>
            <button class="navbar__toggle" id="mobile-menu" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="navbar-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="navbar__menu" id="navbar-menu">
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Ínicio</a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Projetos</a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Ferramentas</a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Sobre</a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Contato</a>
                </li>
                <li class="navbar__btn">
                    <a href="/" class="button">Currículo</a>
                </li>
            </ul>
        </div>
    </nav>

    <!--HERO SECTION-->
    <div class="main">
        <div class="main__container">
            <div class="main__content">
                <h1>Nicolas <span class="destaque">Silva</span></h1>
                <h2>Desenvolvedor Unity</h2>
                <button class="project__button">Ver projetos</button>
                <button class="contact__button">Contato</button>
            </div>
            <div class="main__imgContainer">
                <img src="images/Me Pixelsizel.png" alt="mePixel" id="main__img" width="400px">
            </div>
        </div>
        <hr class="main__hr">
    </div>

    <!--PROJECTS SECTION-->
    <div class="project">
        <div class="project__container">
            <button class="leftArrow__button"></button>
            <button class="rightArrow__button"></button>
            <div class="project__content">
                <h2>Projetos</h2>
                <hr class="project__hr">
            </div>
            <div class="game__container"></div>
            <div class="arrow__left">
                <img src="images/seta-direita.png" alt="leftArrow" id="main__leftarrow" width="100px">
            </div>
            <div class="arrow__right">
                <img src="images/seta-direita.png" alt="rightArrow" id="main__rightarrow" width="100px">
            </div>
        </div>
    </div>



    <script src="app.js"></script>
</body>

</html>
